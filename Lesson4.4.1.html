<!DOCTYPE html>
<html>
<head>
    <title>Confirm Box</title>
    <script type="text/javascript">
        function show_alert() {
            alert("WARNING! WARNING!");
        }

        function show_prompt() {
            var name = prompt("Please enter your name:", "nameless");
            if (name != null && name != "") {
                document.write("Welcome " + name + "! Please come in");
            }
        }

        function show_confirm() {
            var ans = confirm("Do you want to proceed?");
            if (ans == true) {
                document.write("You have entered stage 2 (Please refresh to go back)");
            } else {
                document.write("You are still at stage 1");
            }
        }
    </script>
</head>
<body>
    <input type="button" onclick="show_confirm()" value="show confirm box">
    <input type="button" onclick="show_prompt()" value="show prompt">
    <input type="button" onclick="show_alert()" value="show alert box">
</body>
</html>
