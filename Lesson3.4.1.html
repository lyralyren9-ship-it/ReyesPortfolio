<!DOCTYPE html>
<html>
<head><title>Table Style</title></head>
<style type="text/css">
Table {font-family: Arial, Helvetica; background-color: #cccccc;}
tr.highlight {background-color: #ffff00;}
td.banner {background-color: #999999; color: #ffffff;
font-size: 2em; text-align:center; border:solid red;}
</style>
<body>
<table border>
<tr><td colspan="3" class="banner"><h2 align="center">My Favorite Limbus Company Sinners</h2></td></tr>
<tr><th>SINNER (#NOT PLACE)</th><th>DESCRIPTION</th><th>LITERARY BASIS</th></tr>
<tr class="highlight"><td>Outis (#12)</td><td>Based on Odysseus</td>
<td>The Odyssey</td></tr>
<tr class="highlight"><td>Don Quixote (#3)</td><td>Based on Sancho Panza</td>
<td>Don Quixote (Book)</td></tr>
<tr class="highlight"><td>Rodion (#9)</td><td>Based on Rodion Rasklonikov</td>
<td>Crime & Punishment</td></tr>
</table>
</body>
</html>
